<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单管理 | web4browser 管理后台</title>
    <link rel="stylesheet" href="/admin-theme.css" />
  </head>
  <body class="admin-body" data-admin-page="orders">
    <header class="admin-header">
      <div class="container admin-header-inner">
        <div class="admin-brand-wrap">
          <div class="admin-title">web4browser 订单管理</div>
          <div class="admin-subtitle">查看结账尝试、支付状态和套餐结构。</div>
        </div>
        <nav class="admin-top-nav"></nav>
        <div class="admin-header-actions">
          <button class="button button-primary" id="admin-refresh" type="button">刷新</button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="container">
        <div class="admin-feedback" id="admin-feedback" hidden></div>

        <section class="admin-panel">
          <div class="admin-section-header">
            <div>
              <h1>订单列表</h1>
              <p>可按用户、套餐、订单号或支付渠道搜索，并筛选支付状态。</p>
            </div>
          </div>

          <div class="admin-filter-bar">
            <label class="admin-filter-field admin-filter-field-wide">
              <span>搜索</span>
              <input id="order-search" type="search" placeholder="订单号、邮箱、用户昵称或套餐" />
            </label>
            <label class="admin-filter-field">
              <span>状态</span>
              <select id="order-status">
                <option value="">全部</option>
                <option value="pending">待处理</option>
                <option value="paid">已支付</option>
                <option value="failed">失败</option>
              </select>
            </label>
            <div class="admin-header-actions">
              <button class="button button-secondary" id="order-apply" type="button">应用筛选</button>
            </div>
          </div>

          <div class="admin-summary-grid" id="orders-summary"></div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>订单</th>
                  <th>用户</th>
                  <th>套餐</th>
                  <th>金额</th>
                  <th>状态</th>
                  <th>渠道</th>
                  <th>创建时间</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/admin-orders.js"></script>
  </body>
</html>
