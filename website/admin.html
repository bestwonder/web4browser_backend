<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web4browser 管理后台</title>
    <link rel="stylesheet" href="/admin-theme.css" />
  </head>
  <body class="admin-body" data-admin-page="dashboard">
    <header class="admin-header">
      <div class="container admin-header-inner">
        <div class="admin-brand-wrap">
          <div class="admin-title">web4browser 管理后台</div>
          <div class="admin-subtitle">商业运营、授权状态和 OpenClaw 网关统一看板。</div>
        </div>
        <nav class="admin-top-nav"></nav>
        <div class="admin-header-actions">
          <a class="button button-secondary" href="/index.html" target="_blank" rel="noreferrer">打开官网</a>
          <button class="button button-primary" id="admin-refresh" type="button">刷新</button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="container">
        <div class="admin-feedback" id="admin-feedback" hidden></div>

        <section class="admin-panel">
          <div class="admin-panel-header">
            <div>
              <h1>运营总览</h1>
              <p>只保留全局指标和最值得优先跟进的最近动态。</p>
            </div>
          </div>
          <div class="admin-metric-grid" id="overview-metrics"></div>
        </section>

        <section class="admin-panel">
          <div class="admin-section-header">
            <div>
              <h2>最新订单</h2>
              <p>最近的结账动作和套餐选择。</p>
            </div>
            <a class="button button-secondary button-small" href="/admin-orders.html">查看订单</a>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>订单</th>
                  <th>用户</th>
                  <th>套餐</th>
                  <th>金额</th>
                  <th>状态</th>
                  <th>创建时间</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-panel">
          <div class="admin-section-header">
            <div>
              <h2>订阅健康度</h2>
              <p>谁在生效、谁在试用、谁即将到期。</p>
            </div>
            <a class="button button-secondary button-small" href="/admin-subscriptions.html">查看订阅</a>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>用户</th>
                  <th>套餐</th>
                  <th>状态</th>
                  <th>容量</th>
                  <th>续费 / 到期</th>
                </tr>
              </thead>
              <tbody id="subscriptions-table-body"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-panel">
          <div class="admin-section-header">
            <div>
              <h2>审计动态</h2>
              <p>最近的后台操作、目标对象和变更痕迹。</p>
            </div>
            <a class="button button-secondary button-small" href="/admin-audit.html">查看审计</a>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>操作者</th>
                  <th>动作</th>
                  <th>目标</th>
                </tr>
              </thead>
              <tbody id="audit-table-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
